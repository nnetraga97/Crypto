services:
  postgres:
    image: postgres:16
    container_name: crypto-settlement-postgres
    environment:
      POSTGRES_DB: crypto_settlement
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    ports:
      - "5432:5432"
    volumes:
      - crypto-settlement-postgres:/var/lib/postgresql/data

volumes:
  crypto-settlement-postgres:
